<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES 加解密工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .mode-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
        }
        
        .mode-toggle button {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .mode-toggle button.active {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-size: 0.9rem;
        }
        
        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #e0e0e0;
            font-size: 1rem;
            font-family: inherit;
        }
        
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: 'Consolas', monospace;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .result-area {
            position: relative;
        }
        
        .copy-btn {
            position: absolute;
            top: 40px;
            right: 8px;
            padding: 8px 16px;
            font-size: 0.85rem;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .copy-btn:hover {
            background: rgba(102, 126, 234, 0.3);
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        
        .alert-success {
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid rgba(39, 174, 96, 0.2);
            color: #27ae60;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 AES 加解密工具</h1>
            <p>安全、快速、本地运行的数据加解密</p>
        </header>
        
        <div id="alert" class="alert"></div>
        
        <div class="card">
            <div class="mode-toggle">
                <button id="modeEncrypt" class="active" onclick="setMode('encrypt')">🔒 加密</button>
                <button id="modeDecrypt" onclick="setMode('decrypt')">🔓 解密</button>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label for="key">密钥 (Key)</label>
                    <input type="password" id="key" placeholder="输入加密密钥...">
                </div>
                
                <div class="form-group">
                    <label for="iv">初始向量 IV (可选)</label>
                    <input type="text" id="iv" placeholder="留空则自动生成">
                </div>
            </div>
            
            <div class="form-group">
                <label for="input">输入文本</label>
                <textarea id="input" placeholder="输入要加密或解密的文本..."></textarea>
            </div>
            
            <div class="btn-group">
                <button class="btn-primary" onclick="process()">
                    <span id="actionText">开始加密</span>
                </button>
                <button class="btn-secondary" onclick="clearAll()">🗑️ 清空</button>
            </div>
        </div>
        
        <div class="card result-area">
            <label for="output">结果</label>
            <button class="copy-btn" onclick="copyResult()">📋 复制</button>
            <textarea id="output" readonly placeholder="结果将显示在这里..."></textarea>
        </div>
        
        <footer>
            <p>🔒 所有操作在本地浏览器完成，数据不会上传到服务器</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        let currentMode = 'encrypt';
        
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeEncrypt').classList.toggle('active', mode === 'encrypt');
            document.getElementById('modeDecrypt').classList.toggle('active', mode === 'decrypt');
            document.getElementById('actionText').textContent = mode === 'encrypt' ? '开始加密' : '开始解密';
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 3000);
        }
        
        function process() {
            const key = document.getElementById('key').value;
            const iv = document.getElementById('iv').value;
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            
            if (!key) { showAlert('请输入密钥', 'error'); return; }
            if (!input) { showAlert('请输入文本', 'error'); return; }
            
            try {
                const keyHash = CryptoJS.SHA256(key).toString().substring(0, 32);
                
                if (currentMode === 'encrypt') {
                    const ivValue = iv || CryptoJS.lib.WordArray.random(16).toString();
                    const encrypted = CryptoJS.AES.encrypt(input, CryptoJS.enc.Utf8.parse(keyHash), {
                        iv: CryptoJS.enc.Utf8.parse(ivValue.padEnd(16, '0').substring(0, 16)),
                        mode: CryptoJS.mode.CBC,
                        padding: CryptoJS.pad.Pkcs7
                    });
                    output.value = ivValue + ':' + encrypted.toString();
                    showAlert('加密成功！', 'success');
                } else {
                    const parts = input.split(':');
                    if (parts.length !== 2) { showAlert('密文格式错误', 'error'); return; }
                    
                    const decrypted = CryptoJS.AES.decrypt(parts[1], CryptoJS.enc.Utf8.parse(keyHash), {
                        iv: CryptoJS.enc.Utf8.parse(parts[0].padEnd(16, '0').substring(0, 16)),
                        mode: CryptoJS.mode.CBC,
                        padding: CryptoJS.pad.Pkcs7
                    });
                    
                    const result = decrypted.toString(CryptoJS.enc.Utf8);
                    if (!result) { showAlert('解密失败，请检查密钥', 'error'); return; }
                    output.value = result;
                    showAlert('解密成功！', 'success');
                }
            } catch (e) {
                showAlert('操作失败: ' + e.message, 'error');
            }
        }
        
        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) { showAlert('没有可复制的内容', 'error'); return; }
            output.select();
            document.execCommand('copy');
            showAlert('已复制到剪贴板', 'success');
        }
        
        function clearAll() {
            document.getElementById('key').value = '';
            document.getElementById('iv').value = '';
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            showAlert('已清空', 'success');
        }
    </script>
</body>
</html>
